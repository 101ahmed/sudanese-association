  programs:
    subheading: "برامجنا"
    heading: "أبرز مجالات العمل"
    item1_title: "الترابط الاجتماعي"
    item1_text: "تنظيم لقاءات تجمع أفراد الجالية السودانية بمدينة رين وتعزز روح التعارف والتكافل."
    item2_title: "الدعم الطلابي"
    item2_text: "مساندة الطلاب الجدد وتسهيل اندماجهم وتبادل الخبرات بينهم وبين أفراد الجالية."
    item3_title: "الأنشطة الثقافية"
    item3_text: "تعريف المجتمع المحلي بالثقافة السودانية عبر فعاليات ثقافية وإعلامية ومجتمعية."
    item4_title: "الدعم المجتمعي"
    item4_text: "إطلاق مبادرات تخدم الأسر والأفراد وتوفر المساندة عند الحاجة داخل رين."
    item5_title: "المبادرات الشبابية"
    item5_text: "تشجيع الشباب على تقديم أفكار جديدة ومشاريع تصنع أثرًا إيجابيًا داخل الجالية."
    item6_title: "الشراكات"
    item6_text: "بناء علاقات تعاون مع الجمعيات والمؤسسات المحلية بما يخدم أهداف الرابطة."
  about_split:
    subheading: "من نحن"
    heading: "عن الرابطة السودانية بمدينة رين"
    card_title: "هوية سودانية وروح جماعية"
    card_text: "الرابطة منصة مجتمعية تهدف إلى جمع السودانيين بمدينة رين تحت مظلة واحدة تحفظ الهوية وتدعم الترابط والعمل المشترك."
    text1: "نطمح إلى بناء مجتمع سوداني متماسك بمدينة رين، يقوم على التعاون والتآزر وتبادل الخبرات، ويعكس صورة مشرقة عن السودانيين في المدينة."
    text2: "نعمل على تقديم أنشطة وخدمات ومبادرات تعزز الاندماج الإيجابي وتحافظ على الروابط الاجتماعية والثقافية بين أفراد الجالية."
    feature1: "تواصل إنساني"
    feature2: "نمو مستمر"
    feature3: "دعم ومساندة"
    read_more: "المزيد عن الرابطة"
  goals:
    subheading: "أهدافنا"
    heading: "ما الذي نعمل عليه؟"
    item1_title: "تقوية الروابط"
    item1_text: "بناء شبكة تواصل قوية بين السودانيين المقيمين بمدينة رين."
    item2_title: "نقل الخبرات"
    item2_text: "إتاحة فرص تبادل المعرفة والتجارب بين الأعضاء في مختلف المجالات."
    item3_title: "خدمة الجالية"
    item3_text: "إطلاق مبادرات عملية تعود بالنفع على الأسر والأفراد في مدينة رين."
    item4_title: "تمكين الشباب"
    item4_text: "تشجيع الطاقات الشابة على المساهمة في الأنشطة والمشاريع المجتمعية."
    item5_title: "تعزيز الحضور"
    item5_text: "إبراز الثقافة السودانية والمشاركة الإيجابية في المجتمع المحلي بمدينة رين."
    item6_title: "بناء الشراكات"
    item6_text: "فتح مجالات تعاون مع الهيئات والجهات التي تشاركنا الرؤية والقيم."
  reviews:
    subheading: "آراء الأعضاء"
    heading: "ماذا يقولون عن الرابطة؟"
    r1_name: "عضو في الرابطة"
    r1_text: "الرابطة قربت بين السودانيين في رين وخلقت مساحة جميلة للتعارف والتعاون والمشاركة."
    r2_name: "طالب سوداني"
    r2_text: "وجود الرابطة ساعدني كثيرًا في التعرف على الجالية والشعور بالانتماء منذ وقت مبكر."
    r3_name: "مشارك في الفعاليات"
    r3_text: "أكثر ما يميز الرابطة هو التنظيم وروح المبادرة والحرص على خدمة جميع أفراد المجتمع."
  contact_preview:
    subheading: "تواصل معنا"
    heading: "انضم إلى الرابطة السودانية بمدينة رين"
    lead_title: "نحن هنا لخدمتكم"
    lead_text: "للانضمام إلى الرابطة أو الاستفسار عن الأنشطة والبرامج أو التنسيق للمبادرات، يمكنكم التواصل معنا مباشرة عبر القنوات التالية أو استخدام نموذج التواصل."
